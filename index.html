
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SILI - Super Intelligent Learning Individual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        apple: {
                            blue: '#0a84ff',
                            blueHover: '#409cff',
                            green: '#30d158',
                            red: '#ff453a',
                            orange: '#ff9f0a',
                            purple: '#bf5af2',
                            yellow: '#ffd60a',
                            dark: '#000000',
                            card: '#1c1c1e',
                            secondary: '#2c2c2e',
                            border: 'rgba(255, 255, 255, 0.08)'
                        }
                    },
                    fontFamily: {
                        sans: [
                            '-apple-system',
                            'BlinkMacSystemFont',
                            '"SF Pro Display"',
                            '"SF Pro Text"',
                            '"SF Pro"',
                            '"Helvetica Neue"',
                            'Inter',
                            'system-ui',
                            'sans-serif'
                        ],
                        mono: ['"JetBrains Mono"', 'SFMono-Regular', 'Menlo', 'monospace']
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-app: #000000;
            --bg-nav: #161617;
            --bg-card: #1c1c1e;
            --bg-secondary: #2c2c2e;
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1a6;
            --text-muted: #86868b;
            --border-color: rgba(255, 255, 255, 0.08);
            --scroll-thumb: rgba(255, 255, 255, 0.12);
        }

        body.light {
            --bg-app: #f4f4f7;
            --bg-nav: #ffffff;
            --bg-card: #ffffff;
            --bg-secondary: #e5e5ea;
            --text-primary: #1d1d1f;
            --text-secondary: #4a4a4f;
            --text-muted: #86868b;
            --border-color: rgba(0, 0, 0, 0.08);
            --scroll-thumb: rgba(0, 0, 0, 0.15);
        }

        body, nav, header, main, section, div, button, input, textarea, select {
            transition: background-color 0.25s cubic-bezier(0.4, 0, 0.2, 1), 
                        border-color 0.25s cubic-bezier(0.4, 0, 0.2, 1), 
                        color 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "Inter", sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: var(--bg-app) !important;
            color: var(--text-primary) !important;
        }

        /* Light-theme overrides */
        body.light {
            background-color: var(--bg-app) !important;
        }
        body.light nav {
            background-color: var(--bg-nav) !important;
            border-color: var(--border-color) !important;
        }
        body.light nav button {
            color: var(--text-secondary) !important;
        }
        body.light nav button.bg-white\/10 {
            background-color: rgba(0, 0, 0, 0.06) !important;
            color: #000000 !important;
        }
        body.light header {
            background-color: rgba(255, 255, 255, 0.8) !important;
            border-color: var(--border-color) !important;
        }
        body.light header h2 {
            color: var(--text-secondary) !important;
        }
        body.light main {
            background-color: var(--bg-app) !important;
        }
        body.light section,
        body.light .bg-gradient-to-b,
        body.light .bg-\[\#1c1c1e\],
        body.light .bg-\[\#1c1c1e\]\/40 {
            background: var(--bg-card) !important;
            background-color: var(--bg-card) !important;
            border-color: var(--border-color) !important;
        }
        body.light h1,
        body.light h2,
        body.light h3,
        body.light h4,
        body.light h5,
        body.light .text-white,
        body.light .text-zinc-100,
        body.light .text-gray-100 {
            color: var(--text-primary) !important;
        }
        body.light p,
        body.light .text-zinc-400,
        body.light .text-gray-400,
        body.light .text-zinc-500 {
            color: var(--text-secondary) !important;
        }
        body.light .text-zinc-300 {
            color: var(--text-primary) !important;
        }

        /* Inputs override */
        body.light input,
        body.light textarea,
        body.light select {
            background-color: var(--bg-nav) !important;
            color: var(--text-primary) !important;
            border-color: var(--border-color) !important;
        }
        body.light input::placeholder,
        body.light textarea::placeholder {
            color: #a1a1a6 !important;
        }

        /* Borders & background cards */
        body.light .border-white\/5,
        body.light .border-white\/10,
        body.light .border-zinc-800 {
            border-color: var(--border-color) !important;
        }
        body.light .bg-black\/40,
        body.light .bg-black\/60,
        body.light .bg-black\/25 {
            background-color: var(--bg-secondary) !important;
        }
        body.light .bg-black\/20 {
            background-color: var(--bg-app) !important;
        }

        /* Dynamic buttons */
        body.light .bg-\[\#2c2c2e\],
        body.light .bg-\[\#2c2c2e\]\/10,
        body.light .bg-\[\#1c1c1e\] .bg-\[\#2c2c2e\] {
            background-color: var(--bg-secondary) !important;
            color: var(--text-primary) !important;
        }
        body.light .hover\:bg-white\/5:hover {
            background-color: rgba(0, 0, 0, 0.04) !important;
        }
        body.light .hover\:bg-white\/10:hover {
            background-color: rgba(0, 0, 0, 0.06) !important;
        }

        /* Markdown Editor Preview Styles */
        .markdown-renderer {
            line-height: 1.7;
            font-size: 0.92rem;
            color: var(--text-secondary);
        }
        .markdown-renderer h1 {
            font-size: 1.6em;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.35em;
            margin-top: 1.4em;
            margin-bottom: 0.7em;
            font-weight: 700;
            color: var(--text-primary);
        }
        .markdown-renderer h2 {
            font-size: 1.3em;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.3em;
            margin-top: 1.3em;
            margin-bottom: 0.6em;
            font-weight: 600;
            color: var(--text-primary);
        }
        .markdown-renderer h3 {
            font-size: 1.15em;
            margin-top: 1.2em;
            margin-bottom: 0.5em;
            font-weight: 600;
            color: var(--text-primary);
        }
        .markdown-renderer p {
            margin-top: 0;
            margin-bottom: 0.85em;
        }
        .markdown-renderer ul {
            list-style-type: disc;
            padding-left: 1.6em;
            margin-bottom: 1em;
        }
        .markdown-renderer ol {
            list-style-type: decimal;
            padding-left: 1.6em;
            margin-bottom: 1em;
        }
        .markdown-renderer li {
            margin-bottom: 0.4em;
        }
        .markdown-renderer code {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg-secondary);
            padding: 0.15em 0.35em;
            border-radius: 4px;
            font-size: 0.88em;
            color: #ff9f0a;
        }
        body.light .markdown-renderer code {
            color: #d15c00;
        }
        .markdown-renderer pre {
            background-color: var(--bg-secondary);
            padding: 1.1em;
            border-radius: 10px;
            overflow-x: auto;
            margin-bottom: 1.2em;
            border: 1px solid var(--border-color);
            text-align: left;
        }
        .markdown-renderer pre code {
            background-color: transparent !important;
            padding: 0;
            border-radius: 0;
            font-size: 0.85em;
            color: inherit !important;
        }
        .markdown-renderer blockquote {
            border-left: 3px solid #007aff;
            padding-left: 1.1em;
            color: var(--text-muted);
            margin-bottom: 1.1em;
            font-style: italic;
        }
        .markdown-renderer table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.2em;
        }
        .markdown-renderer th, .markdown-renderer td {
            border: 1px solid var(--border-color);
            padding: 0.5em 0.75em;
            text-align: left;
        }
        .markdown-renderer th {
            background-color: var(--bg-secondary);
            font-weight: 600;
        }
        .markdown-renderer em {
            font-style: italic;
        }
        .markdown-renderer strong {
            font-weight: 600;
            color: var(--text-primary);
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 0, 0, 0.3); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(10, 132, 255, 0.2); border-radius: 10px; }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",

  }
}
</script>

</head>

    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
